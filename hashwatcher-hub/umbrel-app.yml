id: hashwatcher-hub
category: finance
name: HashWatcher Hub
version: "1.0.0"
tagline: Monitor your ASIC miners from anywhere
description: >-
  HashWatcher Hub turns your Umbrel into a remote bridge for monitoring
  ASIC mining rigs — BitAxe, Canaan, and more — from anywhere in the world.


  Pair it with the free HashWatcher app (available at http://www.HashWatcher.app
  for iOS and macOS) to get real-time dashboards, alerts, and full control
  of your miners right from your phone.


  ⛏ Mining Monitoring

  • Automatic discovery of miners on your local network

  • Real-time polling of hashrate, temperature, power, and efficiency

  • Local web dashboard at port 8787 for quick status checks

  • Proxy requests to individual miners through the hub


  🌐 Remote Access via Tailscale

  • Works alongside the Umbrel Tailscale app — if you already have Tailscale
  installed, HashWatcher Hub detects it automatically. No extra configuration needed.

  • Access your miners — and your entire Umbrel device — securely from anywhere

  • No port forwarding or dynamic DNS required

  • Tailscale key expiry monitoring with proactive alerts in the HashWatcher app


  📱 HashWatcher App Integration

  • Download the companion app at www.HashWatcher.app

  • Connect to your hub by entering your Umbrel's IP and port 8787

  • View fleet-wide dashboards, per-miner details, and historical trends

  • Receive push notifications for miner issues and Tailscale key expiry


  🖥 Full Umbrel Access

  • Since Tailscale gives you a secure tunnel to your Umbrel, you also get
  remote access to all your other Umbrel apps — Home Assistant, Immich,
  Bitcoin Node, and everything else on your dashboard
