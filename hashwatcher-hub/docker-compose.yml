services:
  app_proxy:
    environment:
      APP_HOST: hashwatcher-hub_web_1
      APP_PORT: 8787
      PROXY_AUTH_ADD: "false"

  web:
    image: hashwatcher/hashwatcher-hub:latest
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - "8787:8787"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      PI_HOSTNAME: ${DEVICE_HOSTNAME:-umbrel}
      AGENT_ID: hashwatcher-hub
      BITAXE_HOST: ""
      BITAXE_SCHEME: http
      BITAXE_ENDPOINTS: /system/info,/api/system/info
      POLL_SECONDS: 10
      HTTP_TIMEOUT_SECONDS: 5
      STATUS_HTTP_BIND: 0.0.0.0
      STATUS_HTTP_PORT: 8787
      RUNTIME_CONFIG_PATH: /data/runtime_config.json
      LAST_WIFI_PATH: /data/last_wifi_credentials.json
