# Use this file in the public app store repo (hashwatcherhub).
# Copy to hashwatcher-gateway/docker-compose.yml
version: "3.7"

services:
  web:
    image: hashwatcher/hashwatcher-gateway:latest
    restart: on-failure
    stop_grace_period: 30s
    network_mode: host
    privileged: true
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev/net/tun:/dev/net/tun
    environment:
      PI_HOSTNAME: ${DEVICE_HOSTNAME:-HashWatcherGateway}
      AGENT_ID: hashwatcher-gateway
      HOST_IP: ${DEVICE_HOST:-}
      BITAXE_HOST: ""
      BITAXE_SCHEME: http
      BITAXE_ENDPOINTS: /system/info,/api/system/info
      POLL_SECONDS: 10
      HTTP_TIMEOUT_SECONDS: 5
      STATUS_HTTP_BIND: 0.0.0.0
      STATUS_HTTP_PORT: 8787
      RUNTIME_CONFIG_PATH: /data/runtime_config.json
      LAST_WIFI_PATH: /data/last_wifi_credentials.json
