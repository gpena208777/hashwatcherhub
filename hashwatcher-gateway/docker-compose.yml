services:
  app_proxy:
    environment:
      # With network_mode: host, the app binds directly to the host's port
      APP_HOST: ${DEVICE_HOST:-umbrel.local}
      APP_PORT: 8787
      PROXY_AUTH_ADD: "false"

  web:
    image: hashwatcher/hashwatcher-gateway:latest
    restart: on-failure
    stop_grace_period: 30s
    hostname: hashwatcher-gateway
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    # Note: sysctls not needed with network_mode: host - set in entrypoint.sh
    environment:
      PI_HOSTNAME: ${DEVICE_HOSTNAME:-umbrel}
      AGENT_ID: hashwatcher-gateway
      BITAXE_HOST: ""
      BITAXE_SCHEME: http
      BITAXE_ENDPOINTS: /system/info,/api/system/info
      POLL_SECONDS: 10
      HTTP_TIMEOUT_SECONDS: 5
      STATUS_HTTP_BIND: 0.0.0.0
      STATUS_HTTP_PORT: 8787
      RUNTIME_CONFIG_PATH: /data/runtime_config.json
      LAST_WIFI_PATH: /data/last_wifi_credentials.json
